name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o bin/qvr .

      - name: Test
        run: go test ./... -v -count=1

      # Separate -race pass guards the concurrency added in epic #203
      # (parallel multi-registry fetch, opportunistic prefetch). Kept distinct
      # from the plain test step so a race-only failure is unambiguous.
      - name: Test (race)
        run: go test ./... -race -count=1

      - name: Vet
        run: go vet ./...
